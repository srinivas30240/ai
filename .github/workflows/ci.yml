name: CI - train and save model

# Trigger only on push or PR to master 
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  matrix-pip-sri:
    name: Train and save the model
    runs-on: ubuntu-latest
    strategy:
      matrix: 
        python: [3.11, 3.12]
    defaults:
      run:
        working-directory: AutoSys_Job_Failure_Prediction_ML_Ops

    steps:
      - name: Check-out
        uses: actions/checkout@v4
      
      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      - name: Upgrade the pip 
        run: python -m pip install --upgrade pip setuptools wheel

      - name: install project dependices
        run: python -m pip install -r requirements.txt

      - name: Train the model
        run: |
          python /src/predict.py
          ls -la models
          
      - name: uploading artifacts 
        uses: actions/upload-artifact@v4
        with:
          name: ml-artifacts-${{ matrix.python }}-${{ github.run_id }}
          path: models/*
