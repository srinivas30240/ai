# 
name: CI - Train and Save Model

# Trigger only on push or PR to master
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  train-and-upload:
    name: Train and upload ML artifacts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: [3.11, 3.12]

    defaults:
      run:
        working-directory: AutoSys_Job_Failure_Prediction_ML_Ops  # ML folder

    steps:
      # Checkout code
      - name: Check-out repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python }}

      # Upgrade pip, setuptools, wheel
      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      # Install dependencies
      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      # Ensure models folder exists
      - name: Create models folder
        run: mkdir -p models

      # Train the model
      - name: Train the model
        run: |
          python src/train.py
          ls -la models

      # Run prediction (optional)
      - name: Run prediction
        run: python src/predict.py || echo "Prediction script finished"
      - name: Check models folder
        run: |
          if [ -z "$(ls -A models)" ]; then
            echo "No models found! Failing workflow."
            exit 1
          fi

      # Upload trained models as artifacts
      - name: Upload ML artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml-artifacts-${{ matrix.python }}-${{ github.run_id }}
          path: ${{ github.workspace }}/AutoSys_Job_Failure_Prediction_ML_Ops/models/*